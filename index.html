<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FilmAI — быстрый подбор фильмов по настроению без регистрации." />
  <meta name="theme-color" content="#f4f1f2" />
  <title>FilmAI — фильм на вечер</title>
  <script>
    (() => {
      try {
        const saved = localStorage.getItem("filmai-theme");
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = saved || (systemDark ? "dark" : "light");
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="/styles.css?v=minimal-theme-1" />
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <header class="site-header">
    <a class="logo" href="#top" aria-label="FilmAI — на главную">
      <span class="logo-mark">F</span>
      <span>Film<span class="logo-accent">AI</span></span>
    </a>

    <nav class="header-actions" aria-label="Основная навигация">
      <span class="status-badge" id="statusBadge">…</span>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Включить тёмную тему" title="Сменить тему">
        <span class="theme-icon" aria-hidden="true">☾</span>
      </button>
      <button class="favorites-button" id="favoritesButton" type="button" aria-label="Показать избранное">
        <span aria-hidden="true">♥</span>
        <b id="favoritesCount">0</b>
      </button> 
      <button class="favorites-button" id="libraryButton" type="button" aria-label="Открыть библиотеку просмотров">
  <span aria-hidden="true">▣</span>
  <b id="libraryCount">0</b>
</button>    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <h1>Что посмотреть?</h1>
      <p class="hero-copy">Опиши настроение или назови любимый фильм.</p>

      <form class="search-panel" id="recommendForm">
        <label class="visually-hidden" for="movieQuery">Что хочется посмотреть?</label>
        <div class="search-row">
          <textarea id="movieQuery" maxlength="500" rows="2" placeholder="Например: умная фантастика с сильными эмоциями"></textarea>
          <button id="submitButton" type="submit">
            <span class="button-icon" aria-hidden="true">✦</span>
            <span class="button-text">Найти</span>
          </button>
        </div>

        <div class="prompt-chips" aria-label="Быстрые варианты">
          <button type="button" data-prompt="Хочу лёгкую и смешную комедию на вечер">Комедия</button>
          <button type="button" data-prompt="Хочу напряжённый и действительно страшный фильм ужасов">Ужасы</button>
          <button type="button" data-prompt="Хочу умную фантастику, после которой есть о чём подумать">Фантастика</button>
          <button type="button" data-prompt="Хочу быстрый стильный боевик с крутыми драками">Экшен</button>
          <button type="button" data-prompt="Хочу красивый романтический фильм с сильными эмоциями">Романтика</button>
        </div>

        <div class="form-meta">
          <span class="character-count"><b id="charCount">0</b>/500</span>
        </div>
      </form>
    </section>

    <section class="results-section hidden" id="resultsSection" aria-live="polite">
      <div class="section-heading">
        <h2>Рекомендации</h2>
        <button class="ghost-button" id="newSearchButton" type="button">Новый поиск</button>
      </div>
      <div class="source-note" id="sourceNote"></div>
      <div class="movie-grid" id="resultsGrid"></div>
    </section>

    <section class="popular-section" id="popularSection">
      <div class="section-heading">
        <h2>Популярное</h2>
      </div>
      <div class="movie-grid compact" id="popularGrid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>
  </main>

  <aside class="favorites-drawer" id="favoritesDrawer" aria-hidden="true">
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="drawer-panel">
      <div class="drawer-header">
        <h2>Избранное</h2>
        <button id="closeFavorites" class="close-button" type="button" aria-label="Закрыть">×</button>
      </div>
      <div id="favoritesGrid" class="favorites-list"></div>
    </div>
  </aside>

  <aside class="favorites-drawer" id="libraryDrawer" aria-hidden="true">
  <div class="drawer-backdrop" id="libraryBackdrop"></div>

  <div class="drawer-panel">
    <div class="drawer-header">
      <h2>Моя библиотека</h2>

      <button
        id="closeLibrary"
        class="close-button"
        type="button"
        aria-label="Закрыть библиотеку"
      >
        ×
      </button>
    </div>
<div class="library-toolbar">
  <label for="librarySort">Сортировка</label>

  <select id="librarySort">
    <option value="newest">Сначала новые</option>
    <option value="oldest">Сначала старые</option>
    <option value="rating-high">Высокая оценка</option>
    <option value="rating-low">Низкая оценка</option>
  </select>
</div>
    <div id="libraryGrid" class="favorites-list">
      <div class="empty-state">
        История просмотров пока пуста
      </div>
    </div>
  </div>
</aside>
  <div class="rating-modal" id="ratingModal" aria-hidden="true">
  <div class="rating-backdrop" id="ratingBackdrop"></div>

  <div
    class="rating-panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="ratingTitle"
  >
    <button
      class="close-button rating-close"
      id="closeRating"
      type="button"
      aria-label="Закрыть окно оценки"
    >
      ×
    </button>

    <p class="rating-kicker">Фильм просмотрен</p>

    <h2 id="ratingTitle">Оцените фильм</h2>

    <p class="rating-movie-title" id="ratingMovieTitle"></p>

    <div
      class="rating-scale"
      id="ratingScale"
      aria-label="Оценка фильма от 1 до 10"
     >
      <button type="button" data-rating="1">1</button>
      <button type="button" data-rating="2">2</button>
      <button type="button" data-rating="3">3</button>
      <button type="button" data-rating="4">4</button>
      <button type="button" data-rating="5">5</button>
      <button type="button" data-rating="6">6</button>
      <button type="button" data-rating="7">7</button>
      <button type="button" data-rating="8">8</button>
      <button type="button" data-rating="9">9</button>
      <button type="button" data-rating="10">10</button>
    </div>
  </div>
</div>
  <div class="toast" id="toast" role="status"></div>

  <footer>
    <a class="logo footer-logo" href="#top"><span class="logo-mark">F</span><span>Film<span class="logo-accent">AI</span></span></a>
    <small>This product uses the TMDB API but is not endorsed or certified by TMDB.</small>
  </footer>

  <script src="/app.js?v=minimal-theme-1" defer></script>
</body>
</html>
